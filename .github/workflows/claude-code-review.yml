name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # needed to post inline review comments
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Allow the @claude implementer's bot-authored PRs to be reviewed.
          # Without this, claude-code-action rejects any non-human actor with
          # "Workflow initiated by non-human actor". Scoped to "claude" rather
          # than "*" so no other external App can invoke this action.
          allowed_bots: 'claude'
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment makes the code-review skill post its findings to the PR.
          # Without it the skill only prints a terminal summary and posts
          # nothing (see the "no --comment argument was provided" note it emits).
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # Skill: lets /code-review:code-review run as a proper skill
          #   invocation instead of being denied (only the code-review plugin
          #   is installed here, so this effectively grants just that skill).
          # mcp__github_inline_comment__create_inline_comment: the tool the
          #   skill posts findings through. Listing an mcp__github_inline_comment__*
          #   tool is also what makes the action install that MCP server at all;
          #   without it the tool doesn't exist and --comment has nothing to post
          #   through. Requires pull-requests: write (granted above).
          claude_args: |
            --model claude-sonnet-5
            --max-turns 300
            --allowedTools "Bash(mise run:*)" "Bash(mise tasks:*)" "Bash(mise install)" "Skill" "mcp__github_inline_comment__create_inline_comment"

      # Capture the full JSON session log (all messages, incl. the result
      # message's permission_denials details) as a downloadable artifact
      # instead of dumping it into the public Actions log. The execution file
      # is written regardless of show_full_output; this just retains it.
      - name: Upload Claude execution log
        if: always() && steps.claude-review.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output
          path: ${{ steps.claude-review.outputs.execution_file }}
          if-no-files-found: ignore

