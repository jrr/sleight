name: screenshots

# Renders the device-resolution screenshot report on every push and PR and
# uploads it as a build artifact, so a layout regression on some screen size is
# visible in the run's artifacts without checking out and building locally. Shots
# are mid-game FreeCell (forced via the app's `?scene=freecell&state=midgame` URL
# contract) at several phone/tablet sizes, portrait and landscape.

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      # Fetch the headless Chromium (and its system deps) Playwright drives. Split
      # from the render step so it's an explicit, cacheable setup action.
      - name: Install headless Chromium
        run: mise run playwright-install

      # Builds the app (via the task's `bundle` dependency) and shoots the report
      # into packages/web-app/screenshots.
      - name: Render screenshot report
        run: mise run screenshots

      - name: Upload screenshot report
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-report
          path: packages/web-app/screenshots
          if-no-files-found: error
