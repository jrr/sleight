[tools]
node = "26"
pnpm = "11"

# Tasks are the set of actions available to developers and agents at the repo
# root. Run `mise tasks` to list them.

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.build]
description = "Build all packages"
depends = ["install"]
run = "pnpm run build"

[tasks.test]
description = "Run all test suites"
depends = ["build"]
run = "pnpm run test"

[tasks.start]
description = "Run the hello CLI"
run = "pnpm run start"

# Quick-and-dirty static server for local browser testing, no Python and no new
# workspace dependency: `serve` is fetched on demand via `pnpm dlx`. Serves the
# *repo root* so the import map in web-app/index.html (`core/` -> /packages/core/)
# resolves; `depends = ["build"]` refreshes the compiled .res.mjs first.
#   mise run serve   # then open http://localhost:8000/packages/web-app/index.html
[tasks.serve]
description = "Serve the repo root for local browser testing (open /packages/web-app/index.html)"
depends = ["build"]
run = "pnpm dlx serve --listen 8000 ."

# Passthrough to the ReScript CLI in a single package. Everything after `--`
# is forwarded to `rescript`, so this one task exposes the whole compiler
# surface (build, build -w, format, clean, …) without granting raw CLI access:
#
#   mise run rescript -- core build -w      # rescript build -w, in packages/core
#   mise run rescript -- core format -all
#
# It stays inside the `Bash(mise run:*)` allowlist, so no workflow change is
# needed to reach a new rescript subcommand.
[tasks.rescript]
description = "Run the ReScript CLI in one package: `mise run rescript -- <package> <args>`"
run = "pnpm --filter \"{{arg(name='package')}}\" exec rescript"

# `depends` runs in parallel, so listing install/build/test here would race
# (test importing build output before build finished). Chain them instead:
# test → build → install, so `ci` just needs `test` and the order is enforced.
[tasks.ci]
description = "Install, build, and test — what the CI pipeline runs"
depends = ["test"]
