[tools]
node = "26"
pnpm = "11"

# Tasks are the set of actions available to developers and agents at the repo
# root. Run `mise tasks` to list them.

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.build]
description = "Build all packages"
depends = ["install"]
run = "pnpm run build"

[tasks.test]
description = "Run all test suites"
depends = ["build"]
run = "pnpm run test"

[tasks.start]
description = "Build and run the CLI"
depends = ["build"]
run = "pnpm run start"

# Run the CLI with arguments. Everything after `--` is forwarded to the built
# script, so this exposes the CLI's whole surface through the task interface
# without granting raw `node` access:
#
#   mise run cli -- list            # list the available games
#   mise run cli -- show stacking   # draw a game's opening layout
[tasks.cli]
description = "Run the CLI with args: `mise run cli -- show <game>`"
depends = ["build"]
run = "node packages/cli/dist/cli.js"

# Vite dev/build/preview for the web-app. Each `depends = ["build"]` so ReScript
# compiles the .res.mjs sources first, then Vite operates on them.
#   mise run dev      # Vite dev server with HMR
#   mise run bundle   # production build -> packages/web-app/dist
#   mise run preview  # serve the built dist locally
[tasks.dev]
description = "Run the web-app Vite dev server"
depends = ["build"]
run = "pnpm --filter web-app run dev"

[tasks.bundle]
description = "Build the web-app into a static site (packages/web-app/dist)"
# `icons` regenerates the app icons from the current card art (and itself
# depends on `build`), so a deployed bundle always ships icons that match the
# cards — the "svg renderer in a build step for deployed builds" from #49.
depends = ["icons"]
run = "pnpm --filter web-app run bundle"

[tasks.preview]
description = "Preview the built web-app locally"
depends = ["build"]
run = "pnpm --filter web-app run preview"

# Render device-resolution screenshots of the game into a self-contained report
# (packages/web-app/screenshots/index.html): mid-game FreeCell at several phone and
# tablet sizes, portrait and landscape. Depends on `bundle` so it shoots the real
# built site (served by Vite preview), and forces the board into a fixed position
# via the app's URL contract (`?scene=freecell&state=midgame`) so the shots are
# deterministic. CI publishes the result as an artifact (see the screenshots
# workflow). The headless Chromium is Playwright's; `playwright-install` fetches it
# on a clean runner (this repo's dev containers ship one already).
[tasks.screenshots]
description = "Render device-resolution screenshots of the game into a report"
depends = ["bundle"]
run = "node packages/web-app/scripts/screenshots.mjs"

# Install the headless Chromium that `screenshots` drives. Split out from the task
# itself so a machine that already has a browser (this repo's dev containers) skips
# the download; CI runs this once before `screenshots`. `--with-deps` also pulls the
# system libraries Chromium needs on a bare Linux runner.
[tasks.playwright-install]
description = "Install the headless Chromium Playwright uses for screenshots"
depends = ["install"]
run = "pnpm --filter web-app exec playwright install --with-deps chromium"

# Regenerate the PWA icons in packages/web-app/public. The icon is composed from
# the real CardArt cards (a fanned 7·8·9), so it depends on `build` to compile
# the ReScript art first, then rasterizes it with @resvg/resvg-js. Pass
# `-- --svg` to print the master SVG instead of writing files.
[tasks.icons]
description = "Generate the web-app PWA icons from the card art"
depends = ["build"]
run = "node packages/web-app/scripts/generate-icons.mjs"

# Refresh the lockfile after changing dependencies (CI installs with a frozen
# lockfile, so it must be committed in sync with the package.json files).
[tasks.relock]
description = "Refresh the pnpm lockfile after dependency changes"
run = "pnpm install --lockfile-only"

# Format every ReScript source file in the workspace, in place. ReScript ships
# its own formatter, so this just fans the `rescript format` CLI across all
# packages. Run it before committing; editors can also format-on-save (see
# .vscode/ and CLAUDE.md).
[tasks.format]
description = "Format all ReScript source files in place"
depends = ["install"]
run = "pnpm -r exec rescript format"

# Verify formatting without changing anything — fails if any file would be
# reformatted. This is what CI enforces (wired into `ci` below).
[tasks.format-check]
description = "Check that all ReScript source is formatted (fails if not)"
depends = ["install"]
run = "pnpm -r exec rescript format --check"

# Passthrough to the ReScript CLI in a single package. Everything after `--`
# is forwarded to `rescript`, so this one task exposes the whole compiler
# surface (build, build -w, format, clean, …) without granting raw CLI access:
#
#   mise run rescript -- core build -w      # rescript build -w, in packages/core
#   mise run rescript -- core format -all
#
# It stays inside the `Bash(mise run:*)` allowlist, so no workflow change is
# needed to reach a new rescript subcommand.
[tasks.rescript]
description = "Run the ReScript CLI in one package: `mise run rescript -- <package> <args>`"
run = "pnpm --filter \"{{arg(name='package')}}\" exec rescript"

# `depends` runs in parallel, so listing install/build/test here would race
# (test importing build output before build finished). Chain them instead:
# test → build → install, so `ci` just needs `test` and the order is enforced.
# `format-check` only reads source (no build output), so it can run alongside
# test — its own `depends = ["install"]` dedupes with test's install.
[tasks.ci]
description = "Install, build, test, and format-check — what the CI pipeline runs"
depends = ["test", "format-check"]
