[tools]
node = "26"
pnpm = "11"

# Tasks are the set of actions available to developers and agents at the repo
# root. Run `mise tasks` to list them.

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.build]
description = "Build all packages"
depends = ["install"]
run = "pnpm run build"

[tasks.test]
description = "Run all test suites"
depends = ["build"]
run = "pnpm run test"

[tasks.start]
description = "Build and run the CLI"
depends = ["build"]
run = "pnpm run start"

# Vite dev/build/preview for the web-app. Each `depends = ["build"]` so ReScript
# compiles the .res.mjs sources first, then Vite operates on them.
#   mise run dev      # Vite dev server with HMR
#   mise run bundle   # production build -> packages/web-app/dist
#   mise run preview  # serve the built dist locally
[tasks.dev]
description = "Run the web-app Vite dev server"
depends = ["build"]
run = "pnpm --filter web-app run dev"

[tasks.bundle]
description = "Build the web-app into a static site (packages/web-app/dist)"
depends = ["build"]
run = "pnpm --filter web-app run bundle"

[tasks.preview]
description = "Preview the built web-app locally"
depends = ["build"]
run = "pnpm --filter web-app run preview"

# Refresh the lockfile after changing dependencies (CI installs with a frozen
# lockfile, so it must be committed in sync with the package.json files).
[tasks.relock]
description = "Refresh the pnpm lockfile after dependency changes"
run = "pnpm install --lockfile-only"

# Passthrough to the ReScript CLI in a single package. Everything after `--`
# is forwarded to `rescript`, so this one task exposes the whole compiler
# surface (build, build -w, format, clean, …) without granting raw CLI access:
#
#   mise run rescript -- core build -w      # rescript build -w, in packages/core
#   mise run rescript -- core format -all
#
# It stays inside the `Bash(mise run:*)` allowlist, so no workflow change is
# needed to reach a new rescript subcommand.
[tasks.rescript]
description = "Run the ReScript CLI in one package: `mise run rescript -- <package> <args>`"
run = "pnpm --filter \"{{arg(name='package')}}\" exec rescript"

# `depends` runs in parallel, so listing install/build/test here would race
# (test importing build output before build finished). Chain them instead:
# test → build → install, so `ci` just needs `test` and the order is enforced.
[tasks.ci]
description = "Install, build, and test — what the CI pipeline runs"
depends = ["test"]
