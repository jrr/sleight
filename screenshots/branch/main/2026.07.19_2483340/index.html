<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sleight — screenshot report</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 2rem;
      font-family: "Libre Franklin", sans-serif;
      background: radial-gradient(130% 120% at 50% 0%, #13233b 0%, #0b1220 60%);
      color: #e2e8f0;
    }
    header { max-width: 70rem; margin: 0 auto 2rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.6rem; }
    header p { margin: 0; color: #94a3b8; font-size: 0.95rem; }
    header code { color: #86efac; }
    .device { max-width: 70rem; margin: 0 auto 2.5rem; }
    .device h2 {
      font-size: 1.1rem; margin: 0 0 0.75rem;
      border-bottom: 1px solid #22304a; padding-bottom: 0.4rem;
    }
    .device h2 span { color: #94a3b8; font-weight: 400; font-size: 0.85rem; }
    .shots { display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: flex-start; }
    figure { margin: 0; }
    figcaption { color: #94a3b8; font-size: 0.8rem; margin-bottom: 0.4rem; }
    img {
      display: block; max-width: 100%; height: auto;
      border: 1px solid #22304a; border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }
    .shots > figure:last-child img { max-height: 430px; width: auto; }
  </style>
</head>
<body>
  <header>
    <h1>Sleight — screenshot report</h1>
    <p>Mid-game FreeCell (<code>?scene=freecell&state=midgame</code>) across device sizes, portrait and landscape.</p>
  </header>
  
      <section class="device">
        <h2>iPhone 13 mini <span>375×812 · @3×</span></h2>
        <div class="shots">
          <figure>
            <figcaption>portrait · 375×812 CSS · 1125×2436px</figcaption>
            <a href="iphone-13-mini-portrait.png"><img src="iphone-13-mini-portrait.png" alt="iPhone 13 mini portrait" loading="lazy" /></a>
          </figure>
          <figure>
            <figcaption>landscape · 812×375 CSS · 2436×1125px</figcaption>
            <a href="iphone-13-mini-landscape.png"><img src="iphone-13-mini-landscape.png" alt="iPhone 13 mini landscape" loading="lazy" /></a>
          </figure></div>
      </section>
      <section class="device">
        <h2>Pixel 7 <span>412×915 · @2.625×</span></h2>
        <div class="shots">
          <figure>
            <figcaption>portrait · 412×915 CSS · 1082×2402px</figcaption>
            <a href="pixel-7-portrait.png"><img src="pixel-7-portrait.png" alt="Pixel 7 portrait" loading="lazy" /></a>
          </figure>
          <figure>
            <figcaption>landscape · 915×412 CSS · 2402×1082px</figcaption>
            <a href="pixel-7-landscape.png"><img src="pixel-7-landscape.png" alt="Pixel 7 landscape" loading="lazy" /></a>
          </figure></div>
      </section>
      <section class="device">
        <h2>iPhone 15 Pro Max <span>430×932 · @3×</span></h2>
        <div class="shots">
          <figure>
            <figcaption>portrait · 430×932 CSS · 1290×2796px</figcaption>
            <a href="iphone-15-pro-max-portrait.png"><img src="iphone-15-pro-max-portrait.png" alt="iPhone 15 Pro Max portrait" loading="lazy" /></a>
          </figure>
          <figure>
            <figcaption>landscape · 932×430 CSS · 2796×1290px</figcaption>
            <a href="iphone-15-pro-max-landscape.png"><img src="iphone-15-pro-max-landscape.png" alt="iPhone 15 Pro Max landscape" loading="lazy" /></a>
          </figure></div>
      </section>
      <section class="device">
        <h2>iPad mini <span>768×1024 · @2×</span></h2>
        <div class="shots">
          <figure>
            <figcaption>portrait · 768×1024 CSS · 1536×2048px</figcaption>
            <a href="ipad-mini-portrait.png"><img src="ipad-mini-portrait.png" alt="iPad mini portrait" loading="lazy" /></a>
          </figure>
          <figure>
            <figcaption>landscape · 1024×768 CSS · 2048×1536px</figcaption>
            <a href="ipad-mini-landscape.png"><img src="ipad-mini-landscape.png" alt="iPad mini landscape" loading="lazy" /></a>
          </figure></div>
      </section>
</body>
</html>
